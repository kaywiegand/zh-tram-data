# ===========================================================================
# Steuert public/index.html (Hub). headline_kpis_from zeigt auf eine Slide-ID —
# die 4 Hero-KPIs auf dem Hub sind genau die figures-Liste dieser Slide.
hub:
  headline_kpis_from: ausgangssituation-title-overview
  tagline: "Vom Rohdaten-Archiv zum Master-Datensatz"
  subtitle: "Data-Engineering-Pipeline für das Zürcher Tramnetz (VBZ)"
  footer_tagline: "Data-Engineering-Grundlage für das Analyse- und Vorhersage-Projekt zh-tram-flow"
  repo_link_label: "GitHub Repo zum Projekt"
  about:
    - label: "Motivation"
      text: "Entstanden als Abschlussarbeit einer Data-Science-Fortbildung — mit dem Anspruch, Data Science nicht abstrakt, sondern an einem Alltagsbeispiel mit echtem Impact zu zeigen. Die Recherche führte über den ÖPNV nach Zürich mit seiner herausragend guten Open-Data-Landschaft."
    - label: "Aufgabe"
      text: "Einen sauberen Master-Datensatz der realen VBZ-Tram-Halte bauen, mit dem eine qualitativ belastbare Analyse überhaupt erst möglich wird — die Data-Engineering-Grundlage für zh-tram-flow, dem Analyse- und Vorhersage-Projekt zu Zürich Tram. Leitgedanke: reduzieren was da ist, anreichern was fehlt."
    - label: "Reduktion"
      text: "~400 Transportunternehmen → VBZ Tram, Polars statt Pandas (~4× schneller und sparsamer, per Benchmark belegt), 21 → 10 Spalten, ~11 % Zeilen entfernt."
    - label: "Anreicherung"
      text: "Vier Kontextquellen recherchiert und integriert — GTFS, Meteo, Events (kein Open Data → Handaufbau), Geo. 10 → 26 Spalten über Left- und Spatial-Joins."
    - label: "Resultat"
      text: "vbz_master.parquet — 94,4 M Halt-Ereignisse × 26 Spalten, 1:1 reproduzierbar über 9 Notebooks, validiert und deckungsgleich mit dem Original."
  quick_links:
    - {href: "https://github.com/kaywiegand/zh-tram-flow", label: "GitHub Repo zum Analyse- und Vorhersage-Projekt"}
  view_order: [overview, techview, storyview]
  view_cards:
    overview:
      kicker: "Overview"
      label: "Business & Ergebnis"
      description: "Der Datensatz und der Weg dorthin, verdichtet für Stakeholder und Recruiter. Fokus auf Reduktion, Anreicherung und Resultat."
      badge: "HR · Business"
      badge_class: blue
    techview:
      kicker: "Tech View"
      label: "Engineering Deep-Dive"
      description: "Werkzeugwahl, Join-Mechanik, Schema und Validierung im Detail. Für Data Engineers und Tech Leads."
      badge: "Data Engineering"
      badge_class: dark
    storyview:
      kicker: "Story View"
      label: "Der ganze Weg"
      description: "Von 38 GB Rohdaten zum Master: Genese, Motivation, Reduktion, Anreicherung, Vereinigung — vollständig erzählt. Portfolio-Vollansicht."
      badge: "Portfolio"
      badge_class: purple

view_composition:
  overview:
    - einstieg
    - genese
    - ausgangssituation
    - reduktion
    - anreicherung
    - vereinigung
    - resultat
    - grenzen-ausblick

  storyview:
    - einstieg
    - genese
    - ausgangssituation
    - reduktion
    - anreicherung
    - vereinigung
    - resultat
    - grenzen-ausblick

  techview:
