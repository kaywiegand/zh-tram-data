hub:
  headline_kpis_from: ausgangssituation-title-overview
  tagline: "Vom Rohdaten-Archiv zum Master-Datensatz"
  subtitle: "Data-Engineering-Pipeline für das Zürcher Tramnetz (VBZ)"
  footer_tagline: "Data-Engineering-Grundlage für das Analyse- und Vorhersage-Projekt zh-tram-flow"
  repo_link_label: "GitHub Repo zum Projekt"
  about:
    - label: "Motivation"
      text: "Entstanden als Abschlussarbeit einer Data-Science-Fortbildung — mit dem Anspruch, Data Science nicht abstrakt, sondern an einem Alltagsbeispiel mit echtem Impact im ÖPNV zu zeigen. Die Recherche führte über deutsche ÖPNV Betreiber nach Zürich mit seiner herausragend guten Open-Data-Landschaft."
    - label: "Aufgabe"
      text: "Einen sauberen Master-Datensatz der realen VBZ-Tram-Halte bauen, mit dem eine qualitativ belastbare Analyse überhaupt erst möglich wird — die Data-Engineering-Grundlage für zh-tram-flow, dem Analyse- und Vorhersage-Projekt zu Zürich Tram. Leitgedanke: reduzieren was da ist, anreichern was für eine aussagekräftige Analyse fehlt."
    - label: "Reduktion"
      text: "~400 Transportunternehmen → VBZ Tram, Polars statt Pandas (~4× schneller und sparsamer, per Benchmark belegt), 21 → 10 Spalten, ~11 % Zeilen entfernt."
    - label: "Anreicherung"
      text: "Vier Kontextquellen recherchiert und integriert — GTFS, Meteo, Events (kein Open Data → Handaufbau), Geo. 10 → 26 Spalten über Left- und Spatial-Joins."
    - label: "Resultat"
      text: "vbz_master.parquet — 94,4 M Halt-Ereignisse × 26 Spalten, 1:1 reproduzierbar über 9 Notebooks, systematisch validiert: Schema, Wertebereiche, Join-Qualität, Stichproben gegen die Rohdaten."
  quick_links:
    - {href: "https://github.com/kaywiegand/zh-tram-flow", label: "GitHub Repo zum Analyse- und Vorhersage-Projekt"}
  view_order: [overview, techview, storyview]
  view_cards:
